services:
  - type: web
    name: plant-disease-api
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENV
        value: production
      - key: JWT_SECRET_KEY
        sync: false        # set manually in Render dashboard, never in git
      - key: DATABASE_URL
        sync: false        # set manually — will point at a Render Postgres instance
      - key: CORS_ORIGINS
        value: '["https://your-frontend.vercel.app"]'
      - key: MODEL_PATH
        value: model/model.pth
